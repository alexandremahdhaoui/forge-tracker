testCases:
  - name: "blocking-edges"
    description: "Create 2 tickets, add blocking edge, get blocking list"
    setup:
      - id: create-ts
        method: POST
        path: /api/v1/tracking-sets
        body:
          name: "e2e-blocking"
        expectedStatus: 201

    steps:
      - id: create-blocker
        method: POST
        path: /api/v1/tracking-sets/e2e-blocking/tickets
        body:
          id: "blocker-1"
          title: "Blocker Ticket"
        expectedStatus: 201

      - id: create-blocked
        method: POST
        path: /api/v1/tracking-sets/e2e-blocking/tickets
        body:
          id: "blocked-1"
          title: "Blocked Ticket"
        expectedStatus: 201

      - id: add-blocking-edge
        method: POST
        path: /api/v1/tracking-sets/e2e-blocking/edges
        body:
          from: "blocker-1"
          to: "blocked-1"
          type: "blocks"
        expectedStatus: 201

      - id: get-blocking
        method: GET
        path: /api/v1/tracking-sets/e2e-blocking/tickets/blocked-1/blocking
        expectedStatus: 200
        expectedBody:
          length: 1

    teardown:
      - method: DELETE
        path: /api/v1/tracking-sets/e2e-blocking
        expectedStatus: 204
